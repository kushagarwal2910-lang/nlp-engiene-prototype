<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NLP Usability Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #f4f4f4; padding: 40px; }
    h2 { font-size: 15px; margin-bottom: 20px; }
    textarea { width: 100%; height: 140px; padding: 10px; font-family: monospace; font-size: 13px; border: 1px solid #ccc; resize: vertical; }
    button { margin-top: 10px; padding: 8px 18px; background: #000; color: #fff; border: none; font-family: monospace; font-size: 13px; cursor: pointer; }
    #out { margin-top: 20px; background: #fff; border: 1px solid #ddd; padding: 14px; font-size: 12px; white-space: pre-wrap; min-height: 50px; }
    #msg { font-size: 12px; color: #777; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>NLP Usability Engine — Prototype</h2>
  <textarea id="txt" placeholder="Paste usability transcript, survey response or moderator notes..."></textarea>
  <button onclick="run()">Analyze</button>
  <div id="msg"></div>
  <div id="out">Output will appear here.</div>
  <script>
    async function run() {
      const txt = document.getElementById("txt").value.trim()
      const msg = document.getElementById("msg")
      const out = document.getElementById("out")
      if (!txt) { msg.textContent = "Enter text first."; return }
      msg.textContent = "Analyzing... (first run may take a minute)"
      out.textContent = ""
      const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text: txt})
      })
      const data = await res.json()
      out.textContent = JSON.stringify(data, null, 2)
      msg.textContent = res.ok ? "Done." : "Error."
    }
  </script>
</body>
</html>
